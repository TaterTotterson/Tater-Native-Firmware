name: Release Firmware

on:
  push:
    tags:
      - "native-*"

permissions:
  contents: write

jobs:
  firmware:
    name: Build Native Firmware
    runs-on: ubuntu-latest
    env:
      PLATFORMIO_CORE_DIR: ${{ github.workspace }}/.platformio
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: |
            .platformio
          key: platformio-${{ runner.os }}-${{ hashFiles('platformio.ini', 'dependencies.lock', 'main/idf_component.yml') }}
          restore-keys: |
            platformio-${{ runner.os }}-

      - name: Install PlatformIO
        run: python -m pip install --upgrade pip platformio

      - name: Build firmware
        run: platformio run -e voicepe -e sat1

      - name: Package release assets
        id: package
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          RELEASE_DIR="${RUNNER_TEMP}/tater-native-release"
          ./scripts/build_native_firmware_manifest.py \
            --board all \
            --skip-build \
            --release-repo "$GITHUB_REPOSITORY" \
            --release-tag "$TAG" \
            --release-dir "$RELEASE_DIR"

          VERSION="$(python -c 'import json; print(json.load(open("prebuilt_firmware/latest.json", encoding="utf-8"))["version"])')"
          DISPLAY_VERSION="$(python -c 'import json; data=json.load(open("prebuilt_firmware/latest.json", encoding="utf-8")); print(data.get("display_version") or data["version"])')"
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag ${TAG} does not match firmware version ${VERSION}." >&2
            exit 1
          fi

          RELEASE_MANIFEST="$(ls "${RELEASE_DIR}"/*-manifest.json | head -n 1)"
          ./scripts/render_release_notes.py \
            "$RELEASE_MANIFEST" \
            "${RELEASE_DIR}/RELEASE_NOTES.md"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "display_version=${DISPLAY_VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_dir=${RELEASE_DIR}" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: tater-native-${{ steps.package.outputs.version }}
          path: ${{ steps.package.outputs.release_dir }}/*
          if-no-files-found: error

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          VERSION: ${{ steps.package.outputs.version }}
          DISPLAY_VERSION: ${{ steps.package.outputs.display_version }}
          RELEASE_DIR: ${{ steps.package.outputs.release_dir }}
        run: |
          set -euo pipefail
          TITLE="Tater Firmware ${DISPLAY_VERSION}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${RELEASE_DIR}"/* --clobber
            gh release edit "$TAG" --latest --title "$TITLE" --notes-file "${RELEASE_DIR}/RELEASE_NOTES.md"
          else
            gh release create "$TAG" "${RELEASE_DIR}"/* --latest --verify-tag --title "$TITLE" --notes-file "${RELEASE_DIR}/RELEASE_NOTES.md"
          fi
